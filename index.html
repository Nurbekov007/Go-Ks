<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Valve Logo Screen */
        #valve-logo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeOut 3s ease-in-out 2s forwards;
        }

        .valve-text {
            font-size: 80px;
            font-weight: bold;
            color: #ff4655;
            text-shadow: 0 0 30px #ff4655;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Main Content */
        .container {
            text-align: center;
            padding: 40px;
            max-width: 800px;
            opacity: 0;
            animation: fadeIn 1s ease-in 3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 40px;
            line-height: 1.6;
            text-shadow: 0 0 20px rgba(255, 70, 85, 0.5);
            background: linear-gradient(45deg, #ff4655, #ff8800);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 50px;
        }

        button {
            padding: 20px 50px;
            font-size: 1.4em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        #yes-btn {
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            color: #fff;
            border: 2px solid #2196f3;
        }

        #yes-btn:hover {
            background: linear-gradient(135deg, #1976d2, #0d47a1);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(25, 118, 210, 0.4);
        }

        #no-btn {
            background: linear-gradient(135deg, #e65100, #ff6f00);
            color: #fff;
            border: 2px solid #ff9800;
        }

        #no-btn:hover {
            background: linear-gradient(135deg, #ff6f00, #e65100);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 111, 0, 0.4);
        }

        /* Rejection Message */
        .rejection {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .rejection-text {
            font-size: 2.5em;
            font-weight: bold;
            color: #ff4655;
            text-align: center;
            padding: 40px;
            text-shadow: 0 0 30px #ff4655;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            button {
                padding: 15px 35px;
                font-size: 1.1em;
            }
            
            .valve-text {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Valve Logo -->
    <div id="valve-logo">
        <div class="valve-text">VALVE</div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <h1>
            Завтра После пары<br>
            сагат ХЗ нешеде жиналып<br>
            Быр арзан ПК клубка барамыз<br>
            Добро?
        </h1>
        
        <div class="buttons">
            <button id="yes-btn">Согласен</button>
            <button id="no-btn">Не Согласен</button>
        </div>
    </div>

    <!-- Rejection Message -->
    <div class="rejection" id="rejection">
        <div class="rejection-text">
            Қотағм жеме зайбал<br>
            барасын и так адам керек<br>
            ебанат наху
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const rejection = document.getElementById('rejection');

        yesBtn.addEventListener('click', function() {
            window.location.href = 'stats.html';
        });

        noBtn.addEventListener('click', function() {
            rejection.style.display = 'flex';
            
            // Автоматически скрыть через 3 секунды
            setTimeout(() => {
                rejection.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
